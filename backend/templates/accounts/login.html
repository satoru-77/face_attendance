<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — FaceTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        body {
            background: #f9fafb;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .input {
            width: 100%; padding: 10px 14px 10px 38px;
            border: 1px solid #e5e7eb; border-radius: 6px;
            font-size: 14px; color: #111827; outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
            background: white;
        }
        .input:focus { border-color: #f97316; box-shadow: 0 0 0 3px rgba(249,115,22,0.15); }
    </style>
</head>
<body>

<!-- Top bar -->
<div class="bg-white border-b border-gray-200 px-6 h-14 flex items-center" style="box-shadow:0 1px 4px rgba(0,0,0,0.05);">
    <div class="flex items-center gap-2.5">
        <div class="w-7 h-7 rounded flex items-center justify-center" style="background:#f97316;">
            <i class="ph-fill ph-scan text-white" style="font-size:15px;"></i>
        </div>
        <span class="font-bold text-gray-900">FaceTrack</span>
    </div>
</div>

<!-- Center card -->
<div class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-sm">

        <div class="text-center mb-7">
            <h1 class="text-2xl font-bold text-gray-900">Welcome back</h1>
            <p class="text-sm text-gray-500 mt-1">Sign in to manage your classroom attendance</p>
        </div>

        <div class="bg-white border border-gray-200 rounded-xl p-7" style="box-shadow: 0 4px 24px rgba(0,0,0,0.06);">

            {% if messages %}
            {% for msg in messages %}
            <div class="mb-4 flex items-center gap-2 px-3 py-2.5 rounded bg-red-50 border border-red-200 text-red-700 text-sm">
                <i class="ph ph-warning-circle shrink-0"></i> {{ msg }}
            </div>
            {% endfor %}
            {% endif %}

            <form method="POST" class="space-y-4">
                {% csrf_token %}

                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1.5 uppercase tracking-wide">Username</label>
                    <div class="relative">
                        <i class="ph ph-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" style="font-size:16px;"></i>
                        <input type="text" name="username" required placeholder="e.g. teacher001"
                            class="input" autocomplete="username">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1.5 uppercase tracking-wide">Password</label>
                    <div class="relative">
                        <i class="ph ph-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" style="font-size:16px;"></i>
                        <input type="password" name="password" required placeholder="Your password"
                            class="input" autocomplete="current-password">
                    </div>
                </div>

                <button type="submit"
                    class="w-full py-2.5 mt-1 font-semibold text-white text-sm rounded-lg transition-all hover:shadow-lg active:scale-95"
                    style="background:#f97316; box-shadow: 0 2px 8px rgba(249,115,22,0.3);">
                    Sign In
                </button>
            </form>

            <div class="mt-5 pt-4 border-t border-gray-100 text-center">
                <p class="text-sm text-gray-500">
                    First time?
                    <a href="{% url 'register' %}" class="text-orange-500 font-semibold hover:text-orange-600 hover:underline">Register as department admin</a>
                </p>
            </div>
        </div>

        <p class="text-center text-xs text-gray-400 mt-6">
            Powered by InsightFace · Django
        </p>
    </div>
</div>

</body>
</html>
